<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#102A5C" />
  <title>VietinBank Newbie Challenges</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root {
      --navy: #102a5c;
      --navy-2: #163a7d;
      --sky: #35c7ff;
      --sky-2: #8ee8ff;
      --brand-red: #d70f49;
      --pink: #ff4fb8;
      --pink-2: #ff9ed9;
      --yellow: #ffe066;
      --green: #22c989;
      --orange: #ff9d2f;
      --danger: #ff4f6d;
      --white: #ffffff;
      --text: #15223b;
      --muted: #6e7890;
      --card: rgba(255,255,255,0.94);
      --line: rgba(16,42,92,0.10);
      --shadow: 0 22px 60px rgba(8,20,52,0.22);
      --radius: 28px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 15%, rgba(215,15,73,0.42), transparent 27%),
        radial-gradient(circle at 85% 12%, rgba(53,199,255,0.52), transparent 28%),
        radial-gradient(circle at 76% 86%, rgba(255,224,102,0.36), transparent 28%),
        linear-gradient(135deg, #0b1d46 0%, #102a5c 44%, #1e5ba8 100%);
      overflow-x: hidden;
    }

    button, input { font: inherit; }

    button {
      touch-action: manipulation;
    }

    .page {
      min-height: 100vh;
      min-height: 100svh;
      position: relative;
      padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blob {
      position: fixed;
      border-radius: 999px;
      opacity: 0.82;
      z-index: 0;
      animation: floaty 8s ease-in-out infinite;
      pointer-events: none;
      filter: blur(1px);
    }

    .blob.one {
      width: 180px; height: 180px;
      background: var(--brand-red);
      top: 8%; left: 5%;
    }

    .blob.two {
      width: 140px; height: 140px;
      background: var(--sky);
      right: 8%; top: 12%;
      animation-delay: -2s;
    }

    .blob.three {
      width: 210px; height: 210px;
      background: rgba(255,224,102,0.75);
      right: 14%; bottom: 8%;
      animation-delay: -4s;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-18px) scale(1.04); }
    }

    .shell {
      width: min(1100px, 100%);
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.58);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(53,199,255,0.16), transparent 34%),
        radial-gradient(circle at bottom right, rgba(215,15,73,0.15), transparent 36%);
      pointer-events: none;
    }

    .card > * { position: relative; z-index: 1; }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo-mark {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--brand-red), var(--sky));
      display: grid;
      place-items: center;
      color: white;
      font-weight: 950;
      box-shadow: 0 12px 28px rgba(215,15,73,0.28);
      flex: 0 0 auto;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.03;
      letter-spacing: -1.2px;
      color: var(--navy);
      margin-bottom: 12px;
    }

    h2 {
      font-size: clamp(23px, 4vw, 38px);
      color: var(--navy);
      line-height: 1.18;
      letter-spacing: -0.6px;
    }

    h3 {
      font-size: 19px;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      margin-bottom: 20px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 850;
      color: var(--navy);
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(255,255,255,0.82);
      box-shadow: 0 8px 18px rgba(16,42,92,0.12);
      font-size: 14px;
      white-space: nowrap;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 24px;
      align-items: stretch;
    }

    .hero-art {
      border-radius: 26px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.86), transparent 18%),
        linear-gradient(145deg, var(--brand-red), var(--sky));
      min-height: 370px;
      display: grid;
      place-items: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .hero-art .big-emoji {
      font-size: 112px;
      filter: drop-shadow(0 20px 22px rgba(16,42,92,0.28));
      animation: bounce 2.8s ease-in-out infinite;
    }

    .hero-art::before,
    .hero-art::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,0.23);
    }

    .hero-art::before {
      width: 185px; height: 185px;
      top: -50px; right: -45px;
    }

    .hero-art::after {
      width: 235px; height: 235px;
      bottom: -80px; left: -65px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-14px) rotate(5deg); }
    }

    .rules {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0 4px;
    }

    .rule {
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      padding: 12px;
      font-weight: 800;
      color: var(--navy);
      line-height: 1.35;
      font-size: 14px;
    }

    .form {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 850;
      color: var(--navy);
      font-size: 14px;
    }

    input {
      width: 100%;
      border: 2px solid rgba(16,42,92,0.12);
      outline: none;
      border-radius: 18px;
      padding: 15px 16px;
      background: rgba(255,255,255,0.92);
      color: var(--text);
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 5px rgba(53,199,255,0.18);
    }

    .btn {
      border: 0;
      cursor: pointer;
      border-radius: 18px;
      padding: 15px 18px;
      min-height: 52px;
      font-weight: 950;
      color: white;
      background: linear-gradient(135deg, var(--brand-red), var(--sky));
      box-shadow: 0 14px 28px rgba(215,15,73,0.24);
      transition: transform 0.18s, filter 0.18s, opacity 0.18s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      user-select: none;
    }

    .btn:hover { transform: translateY(-2px); filter: brightness(1.03); }
    .btn:active { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      filter: grayscale(0.2);
    }

    .btn.secondary {
      background: linear-gradient(135deg, var(--navy), var(--navy-2));
      box-shadow: 0 14px 28px rgba(16,42,92,0.22);
    }

    .btn.ghost {
      background: rgba(16,42,92,0.08);
      color: var(--navy);
      box-shadow: none;
      border: 1px solid rgba(16,42,92,0.10);
    }

    .btn.danger {
      background: linear-gradient(135deg, #ff4b64, #ff8f4f);
    }

    .btn.star {
      background: linear-gradient(135deg, #ffd34d, #ff9d2f);
      color: #5a3100;
      box-shadow: 0 14px 28px rgba(255,157,47,0.25);
    }

    .meta-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin: 16px 0 20px;
    }

    .question-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .timer {
      min-width: 72px;
      height: 72px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 950;
      color: white;
      background: linear-gradient(135deg, var(--brand-red), var(--navy));
      box-shadow: 0 14px 30px rgba(215,15,73,0.25);
      flex: 0 0 auto;
    }

    .progress {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(16,42,92,0.10);
      margin: 18px 0 24px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--brand-red), var(--sky), var(--yellow));
      transition: width 0.25s linear;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .options.chips {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .option {
      width: 100%;
      text-align: left;
      border: 2px solid rgba(16,42,92,0.08);
      background: rgba(255,255,255,0.84);
      color: var(--text);
      padding: 16px 18px;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: 0.18s ease;
      box-shadow: 0 8px 18px rgba(16,42,92,0.06);
      min-height: 58px;
    }

    .option:hover {
      transform: translateY(-2px);
      border-color: rgba(53,199,255,0.55);
    }

    .option.selected {
      border-color: var(--sky);
      background: rgba(53,199,255,0.12);
      box-shadow: 0 14px 22px rgba(53,199,255,0.12);
    }

    .option.correct {
      border-color: var(--brand-red);
      background: rgba(215,15,73,0.13);
      box-shadow: 0 12px 22px rgba(215,15,73,0.12);
    }

    .option.correct .badge {
      background: linear-gradient(135deg, var(--brand-red), var(--pink));
    }

    .option.wrong {
      border-color: rgba(80,80,80,0.22);
      background: rgba(100,100,100,0.10);
      opacity: 0.88;
    }

    .option.disabled {
      cursor: default;
      transform: none;
    }

    .badge {
      width: 30px;
      height: 30px;
      flex: 0 0 30px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      font-weight: 950;
      color: white;
      background: linear-gradient(135deg, var(--navy), var(--sky));
      font-size: 14px;
    }

    .option-text {
      line-height: 1.45;
      font-weight: 780;
    }

    .answer-box {
      margin-top: 20px;
      border-radius: 22px;
      padding: 18px;
      background: rgba(215,15,73,0.10);
      border: 1px solid rgba(215,15,73,0.24);
      color: var(--navy);
      line-height: 1.55;
    }

    .big-reveal {
      margin-top: 20px;
      border-radius: 26px;
      padding: 24px;
      text-align: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.86), transparent 20%),
        linear-gradient(135deg, rgba(215,15,73,0.16), rgba(53,199,255,0.16));
      border: 1px solid rgba(255,255,255,0.82);
      position: relative;
      overflow: hidden;
    }

    .big-reveal .label {
      color: var(--muted);
      font-weight: 850;
      margin-bottom: 8px;
    }

    .big-reveal .value {
      font-size: clamp(32px, 7vw, 64px);
      line-height: 1.05;
      color: var(--brand-red);
      font-weight: 1000;
      letter-spacing: -1px;
    }

    .fx-icons {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .fx-icons span {
      position: absolute;
      top: 110%;
      font-size: 28px;
      animation: rise 2.8s ease-in-out infinite;
      opacity: 0.85;
    }

    @keyframes rise {
      from { transform: translateY(0) rotate(0deg); opacity: 0; }
      15% { opacity: 1; }
      to { transform: translateY(-220px) rotate(360deg); opacity: 0; }
    }

    .waiting {
      text-align: center;
      padding: 32px 18px;
    }

    .waiting-emoji {
      font-size: 78px;
      margin-bottom: 12px;
      animation: bounce 2.4s ease-in-out infinite;
    }

    .star-choice {
      text-align: center;
      padding: 26px 14px;
    }

    .star-big {
      font-size: 86px;
      filter: drop-shadow(0 16px 18px rgba(255,157,47,0.25));
      animation: starPulse 1.4s ease-in-out infinite;
      margin-bottom: 12px;
    }

    @keyframes starPulse {
      0%, 100% { transform: scale(1) rotate(-2deg); }
      50% { transform: scale(1.08) rotate(3deg); }
    }

    .star-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .star-status {
      margin-top: 16px;
      border-radius: 18px;
      padding: 12px 14px;
      display: inline-flex;
      background: rgba(255,224,102,0.24);
      border: 1px solid rgba(255,224,102,0.54);
      color: var(--navy);
      font-weight: 900;
      line-height: 1.4;
    }

    .leaderboard {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 56px 1fr 86px 74px 104px;
      gap: 10px;
      align-items: center;
      padding: 13px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(16,42,92,0.08);
    }

    .rank-row.top {
      background: linear-gradient(135deg, rgba(255,224,102,0.35), rgba(215,15,73,0.12));
      border-color: rgba(255,224,102,0.72);
    }

    .rank-index { font-weight: 1000; color: var(--navy); }
    .rank-name {
      font-weight: 920;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rank-score { font-weight: 1000; color: var(--brand-red); text-align: right; }
    .rank-stars { color: #c47b00; text-align: center; font-weight: 950; }
    .rank-time { color: var(--muted); text-align: right; font-weight: 760; font-size: 13px; }

    .host-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 20px;
      align-items: start;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 16px 0;
    }

    .stat {
      border-radius: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(16,42,92,0.08);
    }

    .stat strong {
      display: block;
      font-size: 26px;
      color: var(--navy);
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 780;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .small-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 12px;
    }

    .toast {
      padding: 13px 15px;
      border-radius: 18px;
      background: rgba(255,224,102,0.25);
      border: 1px solid rgba(255,224,102,0.58);
      color: var(--navy);
      font-weight: 820;
      line-height: 1.45;
      margin-top: 16px;
    }

    .effect-salary .card {
      box-shadow: 0 22px 60px rgba(255,157,47,0.25);
    }

    .effect-birthday .card::after,
    .effect-women .card::after,
    .effect-final .card::after {
      content: "✦ ✧ ✦ ✧ ✦";
      position: absolute;
      right: 24px;
      top: 20px;
      color: rgba(215,15,73,0.48);
      font-weight: 950;
      letter-spacing: 8px;
      animation: sparkle 1.6s ease-in-out infinite;
    }

    .effect-risk .card {
      box-shadow: 0 22px 60px rgba(255,79,109,0.22);
    }

    .effect-health .timer {
      background: linear-gradient(135deg, var(--green), var(--sky));
    }

    .effect-values .option {
      animation: chipIn 0.5s ease both;
    }

    .effect-values .option:nth-child(2) { animation-delay: .04s; }
    .effect-values .option:nth-child(3) { animation-delay: .08s; }
    .effect-values .option:nth-child(4) { animation-delay: .12s; }
    .effect-values .option:nth-child(5) { animation-delay: .16s; }
    .effect-values .option:nth-child(6) { animation-delay: .20s; }
    .effect-values .option:nth-child(7) { animation-delay: .24s; }
    .effect-values .option:nth-child(8) { animation-delay: .28s; }
    .effect-values .option:nth-child(9) { animation-delay: .32s; }
    .effect-values .option:nth-child(10) { animation-delay: .36s; }

    @keyframes chipIn {
      from { transform: translateY(12px) scale(0.96); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes sparkle {
      0%, 100% { opacity: .25; transform: translateY(0); }
      50% { opacity: .8; transform: translateY(6px); }
    }

    .winner-title {
      text-align: center;
      margin-bottom: 22px;
    }

    .podium {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 22px 0;
    }

    .podium-card {
      border-radius: 24px;
      padding: 20px 14px;
      text-align: center;
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(255,255,255,0.82);
      box-shadow: 0 14px 30px rgba(16,42,92,0.10);
    }

    .podium-card.first {
      transform: translateY(-12px);
      background: linear-gradient(135deg, rgba(255,224,102,0.66), rgba(255,255,255,0.86));
    }

    .podium-icon { font-size: 48px; margin-bottom: 8px; }
    .podium-name {
      font-weight: 1000;
      color: var(--navy);
      margin-bottom: 5px;
      word-break: break-word;
    }
    .podium-score { color: var(--brand-red); font-weight: 1000; }

    .confetti {
      pointer-events: none;
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 4;
    }

    .confetti span {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 16px;
      border-radius: 4px;
      background: var(--brand-red);
      animation: fall 4.8s linear infinite;
    }

    .confetti span:nth-child(3n) { background: var(--sky); }
    .confetti span:nth-child(4n) { background: var(--yellow); }
    .confetti span:nth-child(5n) { background: var(--green); }

    @keyframes fall {
      to { transform: translateY(105vh) rotate(720deg); }
    }

    @media (max-width: 860px) {
      .page {
        align-items: flex-start;
      }

      .hero-grid,
      .host-grid {
        grid-template-columns: 1fr;
      }

      .hero-art {
        min-height: 180px;
      }

      .hero-art .big-emoji {
        font-size: 74px;
      }

      .brand {
        align-items: flex-start;
      }

      .card {
        padding: 20px;
        border-radius: 24px;
      }

      .question-top {
        align-items: flex-start;
      }

      .timer {
        min-width: 62px;
        height: 62px;
        font-size: 24px;
      }

      .rules {
        grid-template-columns: 1fr;
      }

      .options.chips {
        grid-template-columns: 1fr;
      }

      .rank-row {
        grid-template-columns: 42px 1fr 68px 54px;
      }

      .rank-time {
        display: none;
      }

      .stat-grid {
        grid-template-columns: 1fr;
      }

      .podium {
        grid-template-columns: 1fr;
      }

      .podium-card.first {
        transform: none;
      }

      .pill {
        white-space: normal;
      }
    }
  </style>
</head>

<body>
  <div class="blob one"></div>
  <div class="blob two"></div>
  <div class="blob three"></div>

  <main id="app" class="page"></main>

  <script>
    /************************************************************
     * 1. CẤU HÌNH
     * Thay firebaseConfig bằng cấu hình Firebase Realtime Database.
     ************************************************************/
    const CONFIG = {
      roomCode: "VTB2026",
      adminPin: "8888",
      timeLimitSeconds: 20,
      starChoiceSeconds: 5,

    const ADMIN_AUTH_KEY = "vietinbank_newbie_challenges_admin_auth";

    /************************************************************
     * 4. KHỞI TẠO FIREBASE
     ************************************************************/
    if (configReady) {
      firebase.initializeApp(CONFIG.firebaseConfig);
      db = firebase.database();
      roomRef = db.ref(`rooms/${CONFIG.roomCode}`);

      db.ref(".info/serverTimeOffset").on("value", (snap) => {
        serverOffset = snap.val() || 0;
      });

      roomRef.child("game").once("value", (snapshot) => {
        if (!snapshot.exists()) {
          roomRef.child("game").set(defaultGameState());
        }
      });

      roomRef.on("value", (snapshot) => {
        const data = snapshot.val() || {};
        state = data.game || defaultGameState();
        players = data.players || {};
        render();
      });
    } else {
      render();
    }

    /************************************************************
     * 5. HÀM TIỆN ÍCH
     ************************************************************/
    function now() {
      return Date.now() + serverOffset;
    }

    function defaultGameState() {
      return {
        phase: "lobby",
        questionIndex: 0,
        timeLimitSeconds: CONFIG.timeLimitSeconds,
        starStartedAt: null,
        starEndsAt: null,
        questionStartedAt: null,
        questionEndsAt: null,
        updatedAt: Date.now()
      };
    }

    function getPlayerId() {
      let id = localStorage.getItem(PLAYER_ID_KEY);
      if (!id) {
        id = "p_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem(PLAYER_ID_KEY, id);
      }
      return id;
    }

    function getPlayerName() {
      return localStorage.getItem(PLAYER_NAME_KEY) || "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatTime(ms) {
      if (!ms || ms < 0) return "0.0s";
      return (ms / 1000).toFixed(1) + "s";
    }

    function getQuestionRemainingSeconds() {
      if (!state || state.phase !== "question" || !state.questionEndsAt) return 0;
      return Math.max(0, Math.ceil((state.questionEndsAt - now()) / 1000));
    }

    function getStarRemainingSeconds() {
      if (!state || state.phase !== "star" || !state.starEndsAt) return 0;
      return Math.max(0, Math.ceil((state.starEndsAt - now()) / 1000));
    }

    function getQuestionProgressPercent() {
      if (!state || state.phase !== "question" || !state.questionStartedAt || !state.questionEndsAt) return 0;
      const total = state.questionEndsAt - state.questionStartedAt;
      const used = now() - state.questionStartedAt;
      return Math.min(100, Math.max(0, (used / total) * 100));
    }

    function getStarProgressPercent() {
      if (!state || state.phase !== "star" || !state.starStartedAt || !state.starEndsAt) return 0;
      const total = state.starEndsAt - state.starStartedAt;
      const used = now() - state.starStartedAt;
      return Math.min(100, Math.max(0, (used / total) * 100));
    }

    function arraysEqualAsSet(a, b) {
      const aa = [...a].map(Number).sort((x, y) => x - y);
      const bb = [...b].map(Number).sort((x, y) => x - y);
      if (aa.length !== bb.length) return false;
      return aa.every((value, index) => value === bb[index]);
    }

    function isCorrectAnswer(question, answerArray) {
      return arraysEqualAsSet(answerArray, question.correct);
    }

    function currentQuestion() {
      if (!state) return QUESTIONS[0];
      return QUESTIONS[state.questionIndex] || QUESTIONS[0];
    }

    function currentPlayer() {
      return players[getPlayerId()] || null;
    }

    function currentPlayerAnswer() {
      const player = currentPlayer();
      if (!player || !player.answers || state?.questionIndex == null) return null;
      return player.answers[state.questionIndex] || null;
    }

    function didUseStar(player, qIndex = state?.questionIndex) {
      return !!(player && player.starChoices && player.starChoices[qIndex] === true);
    }

    function starLeft(player) {
      return Number(player?.starsLeft ?? CONFIG.maxStars);
    }

    function getLeaderboard(limit = null) {
      const list = Object.entries(players)
        .map(([id, p]) => ({
          id,
          name: p.name || "Người chơi",
          score: Number(p.score || 0),
          correct: Number(p.correct || 0),
          totalTimeMs: Number(p.totalTimeMs || 0),
          starsLeft: Number(p.starsLeft ?? CONFIG.maxStars),
          joinedAt: Number(p.joinedAt || 0),
          online: !!p.online
        }))
        .sort((a, b) => {
          if (b.score !== a.score) return b.score - a.score;
          if (b.correct !== a.correct) return b.correct - a.correct;
          if (a.totalTimeMs !== b.totalTimeMs) return a.totalTimeMs - b.totalTimeMs;
          return a.joinedAt - b.joinedAt;
        });

      return limit ? list.slice(0, limit) : list;
    }

    function getRankIcon(index, final = false) {
      if (index === 0) return final ? "🏆" : "1";
      if (index === 1) return final ? "🥈" : "2";
      if (index === 2) return final ? "🥉" : "3";
      return String(index + 1);
    }

    function renderShell(content, effect = "") {
      app.className = `page ${effect ? "effect-" + effect : ""}`;
      app.innerHTML = `<section class="shell">${content}</section>`;

      return `

          ${right}

      `;
    }

    function setupTick() {
      if (tickHandle) return;
      tickHandle = setInterval(() => {
        updateLiveTimer();
        autoAdvanceGame();
      }, 250);
    }

    function updateLiveTimer() {
      document.querySelectorAll("[data-question-timer]").forEach((el) => {
        el.textContent = getQuestionRemainingSeconds();
      });

      document.querySelectorAll("[data-star-timer]").forEach((el) => {
        el.textContent = getStarRemainingSeconds();
      });

      document.querySelectorAll("[data-question-progress]").forEach((el) => {
        el.style.width = getQuestionProgressPercent() + "%";
      });

      document.querySelectorAll("[data-star-progress]").forEach((el) => {
        el.style.width = getStarProgressPercent() + "%";
      });
    }

    async function autoAdvanceGame() {
      if (!configReady || !db || !state) return;

      if (state.phase === "star" && state.starEndsAt && now() >= state.starEndsAt) {
        const gameRef = roomRef.child("game");
        const snap = await gameRef.once("value");
        const live = snap.val();

        if (live && live.phase === "star" && now() >= live.starEndsAt) {
          const startAt = now();
          await gameRef.update({
            phase: "question",
            questionStartedAt: startAt,
            questionEndsAt: startAt + (live.timeLimitSeconds || CONFIG.timeLimitSeconds) * 1000,
            updatedAt: startAt
          });
        }
      }

      if (state.phase === "question" && state.questionEndsAt && now() >= state.questionEndsAt) {
        const gameRef = roomRef.child("game");
        const snap = await gameRef.once("value");
        const live = snap.val();

        if (live && live.phase === "question" && now() >= live.questionEndsAt) {
          await gameRef.update({
            phase: "answer",
            updatedAt: now()
          });
        }
      }
    }

            <div class="star-status">
              ${
                used
                  ? "⭐ Bạn đã chọn dùng Ngôi sao hi vọng cho câu này."
                  : "Bạn chưa dùng sao cho câu này. Nếu không bấm gì, hệ thống mặc định là không dùng sao."
              }
            </div>

            <p class="small-note">
              Dùng sao và trả lời đúng: +20 điểm. Dùng sao nhưng trả lời sai hoặc hết giờ: -5 điểm.
            </p>
          </div>
        </div>
      `, "star");
    }

    async function setStarChoice(useStar) {
      if (!state || state.phase !== "star") return;

      const player = currentPlayer();
      const qIndex = state.questionIndex;

      if (useStar && starLeft(player) <= 0 && !didUseStar(player, qIndex)) {
        alert("Bạn đã dùng hết 3 Ngôi sao hi vọng.");
        return;
      }

      const id = getPlayerId();
      await roomRef.child(`players/${id}`).transaction((p) => {
        if (!p) return p;

        p.starsLeft = Number(p.starsLeft ?? CONFIG.maxStars);
        p.starChoices = p.starChoices || {};

        const prev = p.starChoices[qIndex] === true;

        if (useStar) {
          if (!prev) {
            if (p.starsLeft <= 0) return;
            p.starsLeft -= 1;
          }
          p.starChoices[qIndex] = true;
        } else {
          if (prev) {
            p.starsLeft = Math.min(CONFIG.maxStars, p.starsLeft + 1);
          }
          p.starChoices[qIndex] = false;
        }

        return p;
      });
    }

    function renderQuestionForPlayer(player) {
      const q = currentQuestion();
      const answer = currentPlayerAnswer();
      const answered = !!answer;
      const starUsed = didUseStar(player, state.questionIndex);

      if (selectedQuestionIndex !== state.questionIndex) {
        selected = new Set(answer?.selected || []);
        selectedQuestionIndex = state.questionIndex;
      }

      const submitDisabled = answered || selected.size === 0;

      renderShell(`
        <div class="card">
          ${brandHeader(`<div class="timer" data-question-timer>${getQuestionRemainingSeconds()}</div>`)}

          <div class="question-top">
            <div>
              <div class="meta-row" style="margin:0 0 14px;">
                <span class="pill">Câu ${state.questionIndex + 1}/${QUESTIONS.length}</span>
                <span class="pill">${starUsed ? "⭐ Đã dùng Ngôi sao hi vọng" : `Còn ${starLeft(player)} sao`}</span>
              </div>
              <h2>${escapeHtml(q.question)}</h2>
            </div>
          </div>

          <div class="progress">
            <div class="progress-bar" data-question-progress style="width:${getQuestionProgressPercent()}%"></div>
          </div>

          <div class="options ${q.effect === "values" ? "chips" : ""}">
            ${q.options.map((option, index) => renderOption(q, index, option, {
              showAnswer: false,
              disabled: answered,
              selected: selected.has(index)
            })).join("")}
          </div>

          <div class="actions">
            <button class="btn" onclick="submitAnswer()" ${submitDisabled ? "disabled" : ""}>
              ${answered ? "Đã ghi nhận câu trả lời ✅" : "Gửi câu trả lời"}
            </button>
          </div>

          ${answered ? `
            <div class="toast">
              Đã ghi nhận câu trả lời. Hết giờ hệ thống sẽ hiện đáp án đúng và bảng xếp hạng Top 10.
            </div>
          ` : `
            <p class="small-note">
              ${q.type === "multi" ? "Câu này có nhiều đáp án đúng. Chọn đúng toàn bộ mới được tính điểm." : "Chọn một đáp án rồi bấm gửi."}
            </p>
          `}
        </div>
      `, q.effect);
    }

    function renderOption(q, index, option, config) {
      const letter = String.fromCharCode(65 + index);
      const selectedClass = config.selected ? "selected" : "";
      const disabledClass = config.disabled ? "disabled" : "";

      let answerClass = "";
      let icon = letter;

      if (config.showAnswer) {
        const isCorrect = q.correct.includes(index);
        const isSelected = config.selected;

        if (isCorrect) {
          answerClass = "correct";
          icon = "✅";
        } else if (isSelected && !isCorrect) {
          answerClass = "wrong";
          icon = "❌";
        }
      }

      return `
        <button
          class="option ${selectedClass} ${disabledClass} ${answerClass}"
          onclick="toggleOption(${index})"
          ${config.disabled ? "disabled" : ""}
          type="button"
        >
          <span class="badge">${icon}</span>
          <span class="option-text">${escapeHtml(option)}</span>
        </button>
      `;
    }

    function toggleOption(index) {
      if (!state || state.phase !== "question") return;
      if (currentPlayerAnswer()) return;

      const q = currentQuestion();

      if (q.type === "single") {
        selected = new Set([index]);
      } else {
        if (selected.has(index)) selected.delete(index);
        else selected.add(index);
      }

      renderQuestionForPlayer(currentPlayer());
    }

    async function submitAnswer() {
      if (!state || state.phase !== "question") return;
      if (now() > state.questionEndsAt) return;
      if (selected.size === 0) return;

      const id = getPlayerId();
      const qIndex = state.questionIndex;
      const q = currentQuestion();
      const player = currentPlayer();

      if (!player) return;

      const answerRef = roomRef.child(`players/${id}/answers/${qIndex}`);
      const existed = await answerRef.once("value");
      if (existed.exists()) return;

      const selectedArray = [...selected].map(Number).sort((a, b) => a - b);
      const correct = isCorrectAnswer(q, selectedArray);
      const starUsed = didUseStar(player, qIndex);

      const elapsedMs = Math.min(
        CONFIG.timeLimitSeconds * 1000,
        Math.max(0, now() - state.questionStartedAt)
      );

      const point = correct ? (starUsed ? 20 : 10) : (starUsed ? -5 : 0);
      const currentScore = Number(player.score || 0);
      const newScore = Math.max(0, currentScore + point);
      const currentCorrect = Number(player.correct || 0);
      const currentTime = Number(player.totalTimeMs || 0);

      await roomRef.child(`players/${id}`).update({
        score: newScore,
        correct: currentCorrect + (correct ? 1 : 0),
        totalTimeMs: currentTime + (correct ? elapsedMs : 0)
      });

      await answerRef.set({
        selected: selectedArray,
        correct,
        elapsedMs,
        point,
        starUsed,
        answeredAt: now()
      });

      renderQuestionForPlayer(currentPlayer());
    }

    async function applyOwnMissedStarPenaltyIfNeeded(player) {
      if (!state || state.phase !== "answer") return;
      const qIndex = state.questionIndex;
      const lockKey = `own-${getPlayerId()}-${qIndex}`;
      if (penaltyLocks.has(lockKey)) return;

      const starUsed = didUseStar(player, qIndex);
      const answer = player?.answers?.[qIndex];

      if (!starUsed || answer) return;

      penaltyLocks.add(lockKey);

      const id = getPlayerId();
      await roomRef.child(`players/${id}`).transaction((p) => {
        if (!p) return p;
        p.answers = p.answers || {};
        if (p.answers[qIndex]) return p;

        const score = Number(p.score || 0);
        p.score = Math.max(0, score - 5);
        p.answers[qIndex] = {
          selected: [],
          correct: false,
          elapsedMs: null,
          point: -5,
          starUsed: true,
          missed: true,
          answeredAt: now()
        };
        return p;
      });
    }

    function renderAnswerForPlayer(player) {
      const q = currentQuestion();
      const answer = currentPlayerAnswer();
      const selectedArray = answer?.selected || [];
      selected = new Set(selectedArray);

      const pointText = getPointText(answer, didUseStar(player, state.questionIndex));

      renderShell(`
        <div class="card">
          ${brandHeader(`<span class="pill">Câu ${state.questionIndex + 1}/${QUESTIONS.length}</span>`)}
          <h2>${escapeHtml(q.question)}</h2>

          ${renderReveal(q)}

          <div class="options ${q.effect === "values" ? "chips" : ""}">
            ${q.options.map((option, index) => renderOption(q, index, option, {
              showAnswer: true,
              disabled: true,
              selected: selected.has(index)
            })).join("")}
          </div>

          <div class="answer-box">
            <b>${pointText}</b><br />
            Đáp án đúng: ${q.correct.map(i => `<b>${escapeHtml(q.options[i])}</b>`).join("; ")}
            ${q.revealNote ? `<br /><br />${escapeHtml(q.revealNote)}` : ""}
          </div>

          <h3 style="margin-top:24px;">Bảng xếp hạng Top 10</h3>
          ${renderLeaderboard(10, false)}

          <div class="toast">
            Chờ admin chuyển sang câu tiếp theo...
          </div>
        </div>
      `, q.effect);
    }

    function renderReveal(q) {
      const icons = q.revealIcons || ["✨", "🎉", "⭐"];
      return `
        <div class="big-reveal">
          <div class="fx-icons">
            ${Array.from({ length: 14 }).map((_, i) => `
              <span style="left:${5 + Math.random() * 90}%; animation-delay:${Math.random() * 1.6}s;">
                ${icons[i % icons.length]}
              </span>
            `).join("")}
          </div>
          <div class="label">Đáp án đúng là</div>
          <div class="value">${escapeHtml(q.revealText)}</div>
        </div>
      `;
    }

    function getPointText(answer, starUsed) {
      if (!answer) {
        return starUsed
          ? "⭐ Bạn đã dùng Ngôi sao hi vọng nhưng chưa gửi câu trả lời: -5 điểm."
          : "Bạn chưa gửi câu trả lời cho câu này: 0 điểm.";
      }

      if (answer.correct && answer.starUsed) {
        return "⭐ Bạn đã dùng Ngôi sao hi vọng và trả lời đúng: +20 điểm!";
      }

      if (!answer.correct && answer.starUsed) {
        return "⭐ Bạn đã dùng Ngôi sao hi vọng nhưng chưa chính xác: -5 điểm.";
      }

      if (answer.correct) {
        return "Chính xác! Bạn nhận được +10 điểm.";
      }

      return "Chưa chính xác: 0 điểm.";
    }

    function renderFinalForPlayer() {
      renderShell(`
        ${renderConfetti()}
        <div class="card">
          ${brandHeader(`<span class="pill">🎉 Kết thúc</span>`)}
          ${renderFinalContent()}
        </div>
      `, "final");
    }

    /************************************************************
     * 8. ADMIN / HOST
     ************************************************************/
    function renderHost() {
      const authed = sessionStorage.getItem(ADMIN_AUTH_KEY) === "true";

      if (!authed) {
        renderHostLogin();
        return;
      }

      if (state?.phase === "answer") {
        applyMissedStarPenaltiesForAll();
      }

      const game = state || defaultGameState();
      const q = currentQuestion();
      const playerCount = Object.keys(players).length;

      const phaseLabel = {
        lobby: "Đang chờ người chơi",
        star: "Người chơi đang chọn Ngôi sao hi vọng",
        question: "Đang trả lời",
        answer: "Đang xem đáp án",
        finished: "Đã kết thúc"
      }[game.phase] || "Đang chờ";

      renderShell(`
        <div class="host-grid">
          <div class="card">
            ${brandHeader(`<span class="pill">Admin</span>`)}
            <h1>Điều khiển trò chơi</h1>
            <p class="subtitle">
              Admin bấm bắt đầu/câu tiếp theo. Người chơi chọn Ngôi sao hi vọng trong 5 giây, sau đó câu hỏi tự chạy ${game.timeLimitSeconds || CONFIG.timeLimitSeconds} giây.
            </p>

            <div class="stat-grid">
              <div class="stat">
                <strong>${playerCount}</strong>
                <span>Người chơi</span>
              </div>
              <div class="stat">
                <strong>${game.questionIndex + 1}/${QUESTIONS.length}</strong>
                <span>Câu hiện tại</span>
              </div>
              <div class="stat">
                <strong>${game.phase === "star" ? `<span data-star-timer>${getStarRemainingSeconds()}</span>` : `<span data-question-timer>${getQuestionRemainingSeconds()}</span>`}</strong>
                <span>Giây còn lại</span>
              </div>
            </div>

            <div class="toast">
              Trạng thái: <b>${phaseLabel}</b>
            </div>

            ${game.phase === "star" ? `
              <div class="progress">
                <div class="progress-bar" data-star-progress style="width:${getStarProgressPercent()}%"></div>
              </div>
              <h3>Đang chọn Ngôi sao hi vọng</h3>
              <p class="subtitle">Câu hỏi chưa hiển thị cho người chơi. Sau 5 giây, câu hỏi sẽ tự bắt đầu.</p>
            ` : ""}

            ${game.phase === "question" ? `
              <div class="progress">
                <div class="progress-bar" data-question-progress style="width:${getQuestionProgressPercent()}%"></div>
              </div>
              <h3>Câu hỏi đang chạy</h3>
              <p class="subtitle">${escapeHtml(q.question)}</p>
            ` : ""}

            ${game.phase === "answer" ? `
              <h3>Đáp án câu ${game.questionIndex + 1}</h3>
              ${renderReveal(q)}
            ` : ""}

            ${(game.phase === "lobby" || game.phase === "answer") ? `
              <div style="margin:14px 0 0;">
                <label style="font-weight:850;color:var(--navy);font-size:14px;display:block;margin-bottom:6px;">
                  Thời gian mỗi câu (giây)
                </label>
                <div style="display:flex;gap:10px;align-items:center;">
                  <input
                    id="timeLimitInput"
                    type="number"
                    min="5"
                    max="120"
                    value="${game.timeLimitSeconds || CONFIG.timeLimitSeconds}"
                    style="width:90px;"
                  />
                  <button class="btn ghost" onclick="updateTimeLimitSeconds()">Lưu</button>
                </div>
              </div>
            ` : ""}

            <div class="actions">
              ${game.phase === "lobby" ? `
                <button class="btn" onclick="startGame()">Bắt đầu game 🚀</button>
              ` : ""}

              ${game.phase === "answer" && game.questionIndex < QUESTIONS.length - 1 ? `
                <button class="btn" onclick="nextQuestion()">Câu tiếp theo ➜</button>
              ` : ""}

              ${game.phase === "answer" && game.questionIndex === QUESTIONS.length - 1 ? `
                <button class="btn" onclick="finishGame()">Kết thúc & công bố Top 3 🏆</button>
              ` : ""}

              ${game.phase === "finished" ? `
                <button class="btn secondary" onclick="backToLobby()">Quay lại phòng chờ</button>
              ` : ""}

              <button class="btn danger" onclick="resetRoom()">Reset điểm & phòng chơi</button>
            </div>
          </div>

          <div class="card">
            <h2>${game.phase === "finished" ? "Kết quả cuối cùng" : "Bảng xếp hạng Top 10"}</h2>
            ${game.phase === "finished" ? renderFinalContent(true) : renderLeaderboard(10, false)}

            <div style="margin-top:28px; padding-top:20px; border-top:1px solid var(--line);">
              <h3 style="margin-bottom:6px;">Quét mã để vào phòng chơi</h3>
              <p class="small-note" style="margin-bottom:14px;">Người chơi dùng điện thoại quét QR bên dưới để truy cập.</p>
              <div id="qrcode" style="display:inline-block; padding:12px; background:#fff; border-radius:16px; box-shadow:0 8px 24px rgba(16,42,92,0.10);"></div>
              <p class="small-note" style="margin-top:10px; word-break:break-all;">https://trongdd26.github.io/vietinbank-newbie/</p>
            </div>
          </div>
        </div>
      `);
    }

    function renderHostLogin() {
      renderShell(`
        <div class="card">
          ${brandHeader(`<span class="pill">Admin</span>`)}
          <div class="hero-grid">
            <div>
              <h1>Đăng nhập admin</h1>
              <p class="subtitle">Nhập PIN admin để điều khiển trò chơi.</p>
              <div class="form">
                <div class="field">
                  <label>Admin PIN</label>
                  <input id="adminPinInput" type="password" placeholder="Nhập PIN admin" />
                </div>
                <button class="btn" onclick="adminLogin()">Vào trang điều khiển</button>
              </div>
            </div>
            <div class="hero-art">
              <div class="big-emoji">🔐</div>
            </div>
          </div>
        </div>
      `);
    }

    function adminLogin() {
      const pin = document.getElementById("adminPinInput").value.trim();
      if (pin !== CONFIG.adminPin) {
        alert("PIN admin chưa đúng.");
        return;
      }

      sessionStorage.setItem(ADMIN_AUTH_KEY, "true");
      renderHost();
    }

    async function startGame() {
      await resetScoresOnly();
      await startQuestionStarPhase(0);
    }

    async function startQuestionStarPhase(questionIndex) {
      const startAt = now();
      await roomRef.child("game").set({
        phase: "star",
        questionIndex,
        starStartedAt: startAt,
        starEndsAt: startAt + CONFIG.starChoiceSeconds * 1000,
        questionStartedAt: null,
        questionEndsAt: null,
        updatedAt: startAt
      });
    }

    async function nextQuestion() {
      if (!state) return;

      const nextIndex = state.questionIndex + 1;
      if (nextIndex >= QUESTIONS.length) {
        await finishGame();
        return;
      }

      selected = new Set();
      selectedQuestionIndex = null;
      await startQuestionStarPhase(nextIndex);
    }

    async function finishGame() {
      await roomRef.child("game").update({
        phase: "finished",
        updatedAt: now()
      });
    }

    async function backToLobby() {
      await roomRef.child("game").set(defaultGameState());
    }

    async function resetScoresOnly() {
      const updates = {};
      Object.keys(players).forEach((id) => {
        updates[`players/${id}/score`] = 0;
        updates[`players/${id}/correct`] = 0;
        updates[`players/${id}/totalTimeMs`] = 0;
        updates[`players/${id}/starsLeft`] = CONFIG.maxStars;
        updates[`players/${id}/starChoices`] = {};
        updates[`players/${id}/answers`] = {};
      });

      if (Object.keys(updates).length) {
        await roomRef.update(updates);
      }
    }

    async function resetRoom() {
      const ok = confirm("Reset toàn bộ điểm, sao và đưa game về phòng chờ?");
      if (!ok) return;

      await roomRef.set({
        game: defaultGameState(),
        players: null
      });
    }

    async function applyMissedStarPenaltiesForAll() {
      if (!state || state.phase !== "answer") return;

      const qIndex = state.questionIndex;
      const lockKey = `all-${qIndex}`;
      if (penaltyLocks.has(lockKey)) return;
      penaltyLocks.add(lockKey);

      const entries = Object.entries(players);

      for (const [id, p] of entries) {
        const starUsed = didUseStar(p, qIndex);
        const answered = !!(p.answers && p.answers[qIndex]);

        if (!starUsed || answered) continue;

        await roomRef.child(`players/${id}`).transaction((player) => {
          if (!player) return player;
          player.answers = player.answers || {};
          if (player.answers[qIndex]) return player;

          const score = Number(player.score || 0);
          player.score = Math.max(0, score - 5);
          player.answers[qIndex] = {
            selected: [],
            correct: false,
            elapsedMs: null,
            point: -5,
            starUsed: true,
            missed: true,
            answeredAt: now()
          };
          return player;
        });
      }
    }

    /************************************************************
     * 9. BẢNG XẾP HẠNG / KẾT QUẢ
     ************************************************************/
    function renderLeaderboard(limit = 10, final = false) {
      const board = getLeaderboard(limit);

      if (!board.length) {
        return `<div class="toast">Chưa có người chơi nào trong bảng xếp hạng.</div>`;
      }

      return `
        <div class="leaderboard">
          ${board.map((p, index) => `
            <div class="rank-row ${final && index < 3 ? "top" : ""}">
              <div class="rank-index">${getRankIcon(index, final)}</div>
              <div class="rank-name">${escapeHtml(p.name)}</div>
              <div class="rank-score">${p.score}</div>
              <div class="rank-stars">${p.starsLeft > 0 ? "⭐".repeat(p.starsLeft) : "0"}</div>
              <div class="rank-time">${formatTime(p.totalTimeMs)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderFinalContent() {
      const board = getLeaderboard();
      const top3 = board.slice(0, 3);

      return `
        <div class="winner-title">
          <h1>Chúc mừng Top 3!</h1>
          <p class="subtitle">
            Xếp hạng theo tổng điểm. Nếu bằng điểm, người có số câu đúng nhiều hơn và tổng thời gian trả lời đúng nhanh hơn sẽ xếp trên.
          </p>
        </div>

        ${top3.length ? `
          <div class="podium">
            ${top3.map((p, index) => `
              <div class="podium-card ${index === 0 ? "first" : ""}">
                <div class="podium-icon">${index === 0 ? "🏆" : index === 1 ? "🥈" : "🥉"}</div>
                <div class="podium-name">${escapeHtml(p.name)}</div>
                <div class="podium-score">${p.score} điểm</div>
                <div class="small-note">${p.correct}/10 câu đúng · Còn ${p.starsLeft > 0 ? "⭐".repeat(p.starsLeft) : "0 sao"} · ${formatTime(p.totalTimeMs)}</div>
              </div>
            `).join("")}
          </div>
        ` : ""}

        <h3>Bảng xếp hạng Top 10</h3>
        ${renderLeaderboard(10, true)}
      `;
    }

    function renderConfetti() {
      return `
        <div class="confetti">
          ${Array.from({ length: 36 }).map(() => `
            <span style="
              left:${Math.random() * 100}%;
              animation-delay:${Math.random() * 3}s;
              animation-duration:${3.2 + Math.random() * 2.8}s;
            "></span>
          `).join("")}
        </div>
      `;
    }

    async function updateTimeLimitSeconds() {
      const input = document.getElementById("timeLimitInput");
      const val = parseInt(input?.value, 10);
      if (!val || val < 5 || val > 120) {
        alert("Vui lòng nhập số giây hợp lệ (5–120).");
        return;
      }
      await roomRef.child("game").update({ timeLimitSeconds: val });
    }

    window.joinGame = joinGame;
    window.setStarChoice = setStarChoice;
    window.toggleOption = toggleOption;
    window.submitAnswer = submitAnswer;
    window.adminLogin = adminLogin;
    window.startGame = startGame;
    window.nextQuestion = nextQuestion;
    window.finishGame = finishGame;
    window.resetRoom = resetRoom;
    window.backToLobby = backToLobby;
    window.updateTimeLimitSeconds = updateTimeLimitSeconds;
  </script>
</body>
</html>
